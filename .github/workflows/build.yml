name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libgl1-mesa-dev libx11-dev

      - name: Install FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install ffmpeg


      - name: Configure
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DFFMPEG_ROOT="${{ github.workspace }}/deps/ffmpeg-master-latest-win64-gpl-shared"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Install plugin
        run: |
          cmake --build build --target install-plugin

  build-windows-installer:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Configure
        shell: bash
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DFFMPEG_ROOT="${{ github.workspace }}/deps/ffmpeg-master-latest-win64-gpl-shared"

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Create installer package
        run: |
          cmake --build build --target dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAWvid-install-windows
          path: build/dist/DAWvid-install/
          retention-days: 7
