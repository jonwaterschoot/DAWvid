name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install jinja2

      - name: Install build tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libgl1-mesa-dev libx11-dev

      - name: Install FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install ffmpeg


      - name: Configure
        shell: bash
        run: |
          PYTHON_EXE=$(python -c "import sys; print(sys.executable)")
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DPython_EXECUTABLE="$PYTHON_EXE" \
              -DPython3_EXECUTABLE="$PYTHON_EXE" \
              -DFFMPEG_ROOT="${{ github.workspace }}/deps/ffmpeg-master-latest-win64-gpl-shared"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DPython_EXECUTABLE="$PYTHON_EXE" \
              -DPython3_EXECUTABLE="$PYTHON_EXE"
          fi

      - name: Build
        shell: bash
        env:
          PYTHONPATH: ${{ env.pythonLocation }}
        run: |
          cmake --build build --parallel

      - name: Install plugin
        run: |
          cmake --build build --target install-plugin

  build-windows-installer:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install jinja2

      - name: Configure
        shell: bash
        run: |
          PYTHON_EXE=$(python -c "import sys; print(sys.executable)")
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DPython_EXECUTABLE="$PYTHON_EXE" \
            -DPython3_EXECUTABLE="$PYTHON_EXE" \
            -DFFMPEG_ROOT="${{ github.workspace }}/deps/ffmpeg-master-latest-win64-gpl-shared"

      - name: Build
        shell: bash
        env:
          PYTHONPATH: ${{ env.pythonLocation }}
        run: |
          cmake --build build --parallel

      - name: Create installer package
        run: |
          cmake --build build --target dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAWvid-install-windows
          path: build/dist/DAWvid-install/
          retention-days: 7
